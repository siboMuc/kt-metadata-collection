name: "\U0001F4CB Team Registration"
description: "Select your team, click Submit — done. One submission per person."
title: "[Team Registration]"
labels: ["metadata", "collection"]
body:
  - type: markdown
    attributes:
      value: "Select your team below and click **Submit new issue**. If you change teams later, just submit again — your latest entry wins.*"

  - type: dropdown
    id: team
    attributes:
      label: Which team are you in?
      options:
        - PIO / System Services
        - Finance (IPMI / Mawista)
        - Pulse
        - Claims
        - Member Portal
        - Reporting
        - DevOps / Platform
        - Other
    validations:
      required: true

  - type: markdown
    attributes:
      value: "<sub>* Only your GitHub username and team selection are recorded and used solely for internal Copilot adoption reporting.</sub>"