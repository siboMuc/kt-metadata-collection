name: 📋 Metadata Collection
description: Submit your knowledge-transfer / contributor metadata.
title: "[Metadata] <your name or team>"
labels: ["metadata", "collection"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for contributing your metadata! 🙌

        > **Note:** The GitHub account that opens this issue is recorded automatically
        > as the issue **author**, so we always know who submitted it. The field below
        > is optional and only needed if you are submitting on behalf of someone else.

  - type: input
    id: github-handle
    attributes:
      label: GitHub handle (optional)
      description: Leave blank to use whoever opened this issue. Fill in only if submitting for someone else.
      placeholder: "@octocat"
    validations:
      required: false

  - type: dropdown
    id: team
    attributes:
      label: Which team are you part of?
      description: Select the team you primarily work with.
      options:
        - PIO / System Services
        - Finance (IPMI / Mawista)
        - Pulse
        - Claims
        - Member Portal
        - Reporting
        - DevOps / Platform
        - Other
    validations:
      required: true

  - type: dropdown
    id: seniority
    attributes:
      label: What is your seniority level?
      options:
        - Intern / Trainee
        - Junior
        - Mid-level
        - Senior
        - Lead / Principal
        - Manager
    validations:
      required: true

  - type: dropdown
    id: tenure
    attributes:
      label: How long have you been working on this product?
      options:
        - Less than 3 months
        - 3–12 months
        - 1–3 years
        - More than 3 years
    validations:
      required: true

  - type: textarea
    id: notes
    attributes:
      label: Anything else you'd like to share? (optional)
      description: Areas of expertise, systems you know best, or context worth capturing.
      placeholder: "e.g. I know the PIO mapping pipeline and finance postings well."
    validations:
      required: false

  - type: checkboxes
    id: consent
    attributes:
      label: Confirmation
      options:
        - label: I confirm this information is accurate.
          required: true
