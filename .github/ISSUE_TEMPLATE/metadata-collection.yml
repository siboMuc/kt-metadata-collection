name: 📋 Metadata Collection
description: Minimal metadata intake.
title: "[Metadata] Team submission"
labels: ["metadata", "collection"]
body:
  - type: markdown
    attributes:
      value: |
        Please enter the mandatory field below.

  - type: dropdown
    id: team
    attributes:
      label: Which team are you in?
      description: Select one team.
      default: 0
      options:
        - PIO / System Services
        - Finance (IPMI / Mawista)
        - Pulse
        - Claims
        - Member Portal
        - Reporting
        - DevOps / Platform
        - Other
    validations:
      required: true
